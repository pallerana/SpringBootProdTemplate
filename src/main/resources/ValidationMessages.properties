# ValidationMessages.properties
# Standard pattern: <module>.<field>.<operation>
# Example: account.name.notblank, account.email.email, account.countryCode.invalid
# Note: Placeholders use numeric indices: {0} = rejected value, {1} = max/min value, {2} = min value

# Account module - NotBlank constraints
account.name.notblank=Account Name is required
account.email.notblank=Email is required

# Account module - Email constraints
# {0} = rejected value (prepended by ExceptionUtils)
account.email.email=Email {0} must be valid

# Account module - Size constraints
# {0} = rejected value, {1} = max, {2} = min
account.name.size=Account Name must be between {2} and {1} characters
account.email.size=Email must be between {2} and {1} characters
# {0} = rejected value, {1} = max
account.website.size=Website must not exceed {1} characters
account.country.size=Country must not exceed {1} characters
account.addressLine1.size=Address Line 1 must not exceed {1} characters
account.addressLine2.size=Address Line 2 must not exceed {1} characters
account.city.size=City must not exceed {1} characters
account.state.size=State must not exceed {1} characters
account.zipcode.size=Zipcode must not exceed {1} characters

# Account module - Min constraints
# {0} = rejected value, {1} = minimum value
account.pageNumber.min=Page number {0} must be at least {1}
account.pageSize.min=Page size {0} must be at least {1}

# Account module - Custom validators
# {0} = rejected value (prepended by ExceptionUtils)
account.countryCode.invalid=Country Code {0} must be a valid 3-letter ISO 3166-1 alpha-3 code (e.g., USA, CAN, GBR)
account.currencyCode.invalid=Currency Code {0} must be a valid 3-letter ISO 4217 code (e.g., USD, EUR, GBP)
account.currency.invalid=Currency Code {0} must be a valid 3-letter ISO 4217 code (e.g., USD, EUR, GBP)

